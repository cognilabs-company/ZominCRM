<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Zomin CRM</title>
  <meta name="description"
    content="Zomin CRM — AI-powered customer relationship management platform for modern businesses." />
  <script>
    (function () {
      try {
        var saved = localStorage.getItem('theme');
        if (saved === 'dark') document.documentElement.classList.add('dark');
        if (saved === 'light') document.documentElement.classList.remove('dark');
      } catch (e) { }
    })();
  </script>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          colors: {
            navy: {
              950: '#060D18',
              900: '#0B1220',
              800: '#0F1B2E',
              750: '#132038',
              700: '#1A2C45',
              600: '#203552',
              500: '#2A4568',
            },
            primary: {
              red: '#E53935',
              redDark: '#C62828',
              redGlow: 'rgba(229,57,53,0.25)',
              blue: '#2F6BFF',
              blueDark: '#1A4FCC',
              blueGlow: 'rgba(47,107,255,0.22)',
              navy: '#123A6F',
            },
            light: {
              bg: '#F0F4FB',
              surface: '#FFFFFF',
              border: '#DDE3F0',
              text: '#0B1220',
              muted: '#64748B',
            },
            accent: {
              cyan: '#06B6D4',
              purple: '#8B5CF6',
              amber: '#F59E0B',
              emerald: '#10B981',
            }
          },
          fontFamily: {
            sans: ['Inter', 'ui-sans-serif', 'system-ui', 'sans-serif'],
          },
          boxShadow: {
            'glow-red': '0 0 20px rgba(229,57,53,0.3), 0 0 40px rgba(229,57,53,0.1)',
            'glow-blue': '0 0 20px rgba(47,107,255,0.3), 0 0 40px rgba(47,107,255,0.1)',
            'card': '0 1px 3px rgba(0,0,0,0.06), 0 4px 16px rgba(0,0,0,0.06)',
            'card-dark': '0 1px 3px rgba(0,0,0,0.3), 0 4px 24px rgba(0,0,0,0.25)',
            'modal': '0 8px 40px rgba(0,0,0,0.35)',
            'sidebar': '2px 0 20px rgba(0,0,0,0.15)',
          },
          animation: {
            'fade-in': 'fadeIn 0.2s ease-out',
            'fade-in-up': 'fadeInUp 0.25s ease-out',
            'slide-in-left': 'slideInLeft 0.2s ease-out',
            'scale-in': 'scaleIn 0.18s ease-out',
            'pulse-glow': 'pulseGlow 2s ease-in-out infinite',
            'spin-slow': 'spin 2s linear infinite',
          },
          keyframes: {
            fadeIn: { from: { opacity: '0' }, to: { opacity: '1' } },
            fadeInUp: { from: { opacity: '0', transform: 'translateY(8px)' }, to: { opacity: '1', transform: 'translateY(0)' } },
            slideInLeft: { from: { opacity: '0', transform: 'translateX(-8px)' }, to: { opacity: '1', transform: 'translateX(0)' } },
            scaleIn: { from: { opacity: '0', transform: 'scale(0.96)' }, to: { opacity: '1', transform: 'scale(1)' } },
            pulseGlow: { '0%,100%': { opacity: '0.6' }, '50%': { opacity: '1' } },
          },
        }
      }
    }
  </script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap"
    rel="stylesheet">
  <style>
    *,
    *::before,
    *::after {
      box-sizing: border-box;
    }

    body {
      font-family: 'Inter', ui-sans-serif, system-ui, sans-serif;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }

    /* ── Scrollbar ─────────────────────────────────────── */
    ::-webkit-scrollbar {
      width: 5px;
      height: 5px;
    }

    ::-webkit-scrollbar-track {
      background: transparent;
    }

    ::-webkit-scrollbar-thumb {
      background: #CBD5E1;
      border-radius: 99px;
    }

    .dark ::-webkit-scrollbar-thumb {
      background: #1A2C45;
    }

    ::-webkit-scrollbar-thumb:hover {
      background: #94A3B8;
    }

    .dark ::-webkit-scrollbar-thumb:hover {
      background: #2A4568;
    }

    /* ── Glass morphism ─────────────────────────────────── */
    .glass {
      background: rgba(255, 255, 255, 0.06);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border: 1px solid rgba(255, 255, 255, 0.08);
    }

    .glass-light {
      background: rgba(255, 255, 255, 0.75);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
    }

    /* ── Sidebar ────────────────────────────────────────── */
    .sidebar-bg {
      background: linear-gradient(180deg, #060D18 0%, #0B1220 40%, #0F1B2E 100%);
    }

    /* ── Nav items ──────────────────────────────────────── */
    .nav-item {
      border-left: 3px solid transparent;
      transition: all 0.16s ease;
    }

    .nav-item:hover {
      background: rgba(229, 57, 53, 0.07);
      border-left-color: rgba(229, 57, 53, 0.35);
      color: #EF5350;
    }

    .nav-active {
      background: linear-gradient(90deg, rgba(229, 57, 53, 0.18) 0%, rgba(229, 57, 53, 0.04) 100%);
      border-left: 3px solid #E53935 !important;
      color: #EF5350 !important;
    }

    /* ── Card hover lift ─────────────────────────────────── */
    .card-lift {
      transition: transform 0.2s ease, box-shadow 0.2s ease;
    }

    .card-lift:hover {
      transform: translateY(-1px);
    }

    /* ── Button shimmer ─────────────────────────────────── */
    .btn-shimmer {
      position: relative;
      overflow: hidden;
    }

    .btn-shimmer::after {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(105deg, transparent 40%, rgba(255, 255, 255, 0.18) 50%, transparent 60%);
      transform: translateX(-100%);
      transition: transform 0.4s ease;
    }

    .btn-shimmer:hover::after {
      transform: translateX(100%);
    }

    /* ── Input focus glow ───────────────────────────────── */
    .input-glow:focus {
      outline: none;
      border-color: #2F6BFF !important;
      box-shadow: 0 0 0 3px rgba(47, 107, 255, 0.18);
    }

    /* ── Gradient text ──────────────────────────────────── */
    .text-gradient-red {
      background: linear-gradient(135deg, #E53935, #FF7043);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .text-gradient-blue {
      background: linear-gradient(135deg, #2F6BFF, #06B6D4);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    /* ── Modal animation ────────────────────────────────── */
    @keyframes modalIn {
      from {
        opacity: 0;
        transform: scale(0.95) translateY(10px);
      }

      to {
        opacity: 1;
        transform: scale(1) translateY(0);
      }
    }

    .modal-enter {
      animation: modalIn 0.22s cubic-bezier(0.34, 1.4, 0.64, 1) forwards;
    }

    /* ── Chat bubbles ────────────────────────────────────── */
    .bubble-in {
      border-radius: 2px 16px 16px 16px;
    }

    .bubble-out {
      border-radius: 16px 2px 16px 16px;
    }

    /* ── Table zebra stripes ─────────────────────────────── */
    .table-auto tbody tr:nth-child(even) {
      background: rgba(0, 0, 0, 0.014);
    }

    .dark .table-auto tbody tr:nth-child(even) {
      background: rgba(255, 255, 255, 0.018);
    }

    /* ── Status badge glow ──────────────────────────────── */
    .badge-success {
      box-shadow: 0 0 8px rgba(16, 185, 129, 0.25);
    }

    .badge-error {
      box-shadow: 0 0 8px rgba(229, 57, 53, 0.25);
    }

    .badge-info {
      box-shadow: 0 0 8px rgba(47, 107, 255, 0.2);
    }

    /* ── Divider ────────────────────────────────────────── */
    .divider {
      display: flex;
      align-items: center;
      gap: 12px;
      color: #94A3B8;
      font-size: 12px;
    }

    .divider::before,
    .divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: currentColor;
      opacity: 0.25;
    }

    /* ── Browser autofill override (prevents white/yellow bg) ─────── */
    input:-webkit-autofill,
    input:-webkit-autofill:hover,
    input:-webkit-autofill:focus,
    input:-webkit-autofill:active {
      -webkit-box-shadow: 0 0 0 1000px rgba(255, 255, 255, 0.08) inset !important;
      -webkit-text-fill-color: #e2e8f0 !important;
      caret-color: #e2e8f0;
      transition: background-color 9999s ease-in-out 0s;
      border-color: rgba(255, 255, 255, 0.15) !important;
    }

    /* Light mode autofill */
    .light input:-webkit-autofill,
    :not(.dark) input:-webkit-autofill {
      -webkit-box-shadow: 0 0 0 1000px #f0f4fb inset !important;
      -webkit-text-fill-color: #0B1220 !important;
    }
  </style>
